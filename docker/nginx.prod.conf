# docker/nginx.prod.conf
# Nginx — WebSocket-aware reverse proxy with TLS termination
# Handles: HTTP→HTTPS redirect, WS upgrade, gzip, security headers

server {
    listen 80;
    server_name _;
    # Force HTTPS in prod — redirect all HTTP
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # TLS — mount real certs at /etc/nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options           DENY        always;
    add_header X-Content-Type-Options    nosniff     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; connect-src 'self' ws: wss:;" always;

    # Gzip for REST responses (not WebSocket)
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # ── Health check (nginx level) ───────────────────────────────────────────
    location /health {
        proxy_pass         http://ambrio-api:8765/health;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── WebSocket — /chat/{session_id} ───────────────────────────────────────
    location /chat/ {
        proxy_pass         http://ambrio-api:8765;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — CRITICAL
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for streaming responses
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://ambrio-api:8765;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
