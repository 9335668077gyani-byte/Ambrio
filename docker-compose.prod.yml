# docker-compose.prod.yml
# ─── PRODUCTION overrides ─────────────────────────────────────────────────────
# Merges with docker-compose.yml
# Command: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:

  chromadb:
    # In prod: NO host port exposure — only internal network access
    # Access via nginx reverse proxy if needed
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: "chromadb.auth.token.TokenAuthenticationServerProvider"
      CHROMA_SERVER_AUTHN_CREDENTIALS: "${CHROMA_AUTH_TOKEN}"
      CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER: "Authorization"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

  ollama:
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          memory: 4G

  ambrio-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: ambrio-api:prod
    environment:
      AMBRIO_ENV:      production
      LOG_LEVEL:       info
      UVICORN_WORKERS: "4"           # multi-worker in prod
      # ChromaDB auth token forwarded to HTTP client
      CHROMA_AUTH_TOKEN: "${CHROMA_AUTH_TOKEN}"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3
    # In prod: NO direct port — go through nginx
    ports: []                        # override base to remove direct exposure

  # ── Nginx — TLS termination + WebSocket reverse proxy ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - ambrio_net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro    # mount TLS certs
    depends_on:
      - ambrio-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
